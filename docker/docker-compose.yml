version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: ichi_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - ichi_mongo_data:/data/db
    networks:
      - ichi_network

  # Backend API
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: ichi_backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb+srv://<USERNAME>:<PASSWORD>@cluster0.u6eggdi.mongodb.net/ichi_delivery?appName=Cluster0
      JWT_SECRET: YOUR_JWT_SECRET_KEY
      WEB3_PROVIDER_URL: http://127.0.0.1:8545
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    volumes:
      - ../backend:/app
      - /app/node_modules
    networks:
      - ichi_network
    command: npm run dev

  # Frontend React App
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: ichi_frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ../frontend:/app
      - /app/node_modules
    networks:
      - ichi_network
    command: npm start

  # ML Service (Deep Learning ETA)
  ml-service:
    build:
      context: ../ml-service
      dockerfile: ../docker/ml-service.Dockerfile
    container_name: ichi_ml_service
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      - ../ml-service:/app
    networks:
      - ichi_network
    command: >
      bash -c "python train_eta_real.py && python app.py"

volumes:
  ichi_mongo_data:

networks:
  ichi_network:
    driver: bridge
